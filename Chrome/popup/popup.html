<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>GitHub Resizer</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header class="header">
      <div class="brand">
        <svg class="logo" viewBox="0 0 256 256" aria-hidden="true">
          <g fill="currentColor">
            <path d="M208 104v8a48 48 0 0 1-48 48h-24a32 32 0 0 1 32 32v40h-64v-40a32 32 0 0 1 32-32h-24a48 48 0 0 1-48-48v-8a49.3 49.3 0 0 1 8.51-27.3A51.92 51.92 0 0 1 76 32a52 52 0 0 1 43.83 24h32.34A52 52 0 0 1 196 32a51.92 51.92 0 0 1 3.49 44.7A49.3 49.3 0 0 1 208 104" opacity=".2"/>
            <path d="M208.3 75.68A59.74 59.74 0 0 0 202.93 28a8 8 0 0 0-6.93-4a59.75 59.75 0 0 0-48 24h-24a59.75 59.75 0 0 0-48-24a8 8 0 0 0-6.93 4a59.78 59.78 0 0 0-5.38 47.68A58.14 58.14 0 0 0 56 104v8a56.06 56.06 0 0 0 48.44 55.47A39.8 39.8 0 0 0 96 192v8H72a24 24 0 0 1-24-24a40 40 0 0 0-40-40a8 8 0 0 0 0 16a24 24 0 0 1 24 24a40 40 0 0 0 40 40h24v16a8 8 0 0 0 16 0v-40a24 24 0 0 1 48 0v40a8 8 0 0 0 16 0v-40a39.8 39.8 0 0 0-8.44-24.53A56.06 56.06 0 0 0 216 112v-8a58 58 0 0 0-7.7-28.32M200 112a40 40 0 0 1-40 40h-48a40 40 0 0 1-40-40v-8a41.74 41.74 0 0 1 6.9-22.48a8 8 0 0 0 1.1-7.69a43.8 43.8 0 0 1 .79-33.58a43.88 43.88 0 0 1 32.32 20.06a8 8 0 0 0 6.71 3.69h32.35a8 8 0 0 0 6.74-3.69a43.87 43.87 0 0 1 32.32-20.06a43.8 43.8 0 0 1 .77 33.58a8.09 8.09 0 0 0 1 7.65a41.76 41.76 0 0 1 7 22.52Z"/>
          </g>
        </svg>
        <div class="brand-text">
          <h1>GitHub Resizer</h1>
          <p class="subtitle">Page width beyond GitHub's 1280&nbsp;px default</p>
        </div>
      </div>
    </header>

    <main class="main">
      <div class="card value-card">
        <button id="decrement" class="step" aria-label="Decrease 1%">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 12h14" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/></svg>
        </button>
        <div class="value">
          <span id="valueText">0</span><span class="unit">%</span>
          <span id="modeText" class="mode">GitHub default</span>
        </div>
        <button id="increment" class="step" aria-label="Increase 1%">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/></svg>
        </button>
      </div>

      <div class="slider-wrap">
        <input
          id="slider"
          type="range"
          min="0"
          max="100"
          step="1"
          value="0"
        />
        <div class="bounds">
          <span>Default</span>
          <span>Full viewport</span>
        </div>
      </div>

      <div class="presets" role="group" aria-label="Quick presets">
        <button type="button" class="preset" data-preset="25">25%</button>
        <button type="button" class="preset" data-preset="50">50%</button>
        <button type="button" class="preset" data-preset="75">75%</button>
        <button type="button" class="preset" data-preset="100">100%</button>
      </div>

      <button id="reset" class="reset" type="button">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 12a9 9 0 1 0 3-6.7M3 4v5h5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Reset to default
      </button>

      <p class="hint">Saved locally; synced when signed in to Chrome.</p>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
